<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profile - CRAFT BAZAAR</title>
    <link rel="stylesheet" href="../css/style.css" />
  </head>
  <!-- ── Search Overlay ──────────────────────────────────── -->
  <div class="search-overlay" id="search-overlay">
    <input
      type="text"
      placeholder="WHAT ARE YOU LOOKING FOR?"
      id="search-input-overlay"
      onkeydown="if (event.key === 'Enter') doSearch();"
    />
    <button class="search-close" onclick="toggleSearch()">✕</button>
  </div>
  <!-- ── Sidebar Overlay ─────────────────────────────────── -->
  <div
    class="sidebar-overlay"
    id="sidebar-overlay"
    onclick="toggleSidebar()"
  ></div>
  <!-- ── Sidebar Menu ────────────────────────────────────── -->
  <div class="sidebar-menu" id="sidebar-menu">
    <div class="sidebar-logo">CRAFT BAZAAR</div>
    <nav>
      <a href="/index.html" class="sidebar-nav-item">Home <span>→</span></a>
      <a href="/pages/explore.html" class="sidebar-nav-item"
        >Explore <span>→</span></a
      >
      <a href="/pages/states.html" class="sidebar-nav-item"
        >States <span>→</span></a
      >
      <a href="/pages/categories.html" class="sidebar-nav-item"
        >Categories <span>→</span></a
      >
      <a href="/pages/about.html" class="sidebar-nav-item"
        >About <span>→</span></a
      >
      <button
        class="btn btn-outline"
        style="margin-top: 1.2rem"
        onclick="logout()"
      >
        Log Out
      </button>
    </nav>
    <p class="sidebar-tagline">
      A curated marketplace celebrating authentic Indian handicrafts from
      artisans across every state of India.
    </p>
  </div>
  <!-- ── Top Navbar ──────────────────────────────────────── -->
  <nav class="zara-nav" id="zara-nav">
    <button class="hamburger-btn" id="hamburger-btn" onclick="toggleSidebar()">
      <span></span> <span></span>
    </button>
    <div class="nav-right">
      <a class="nav-right-item" onclick="toggleSearch()">Search</a>
      <a
        class="nav-right-item"
        href="/pages/cart.html"
        style="position: relative"
        >Bag
        <span class="cart-count-badge cart-badge" style="display: none">0</span>
      </a>
      <a class="nav-right-item" id="nav-login-link" href="/pages/login.html"
        >Log In</a
      >
      <a
        class="nav-right-item"
        id="nav-profile-link"
        href="/pages/dashboard.html"
        style="display: none"
        >Account</a
      >
    </div>
  </nav>
  <body class="page-body">
    <nav class="navbar scrolled">
      <div class="container">
        <div class="nav-inner">
          <a class="nav-logo" href="/index.html">CRAFT BAZAAR</a>
          <ul class="nav-links">
            <li><a href="/index.html">Home</a></li>
            <li><a href="/pages/products.html">Explore</a></li>
            <li><a href="/pages/cart.html">Cart</a></li>
          </ul>
          <div class="nav-actions">
            <button
              class="nav-icon"
              onclick="logout()"
              style="font-size: 0.8rem; color: var(--brown)"
            >
              Exit
            </button>
          </div>
        </div>
      </div>
    </nav>
    <main class="container" style="padding-top: 7rem; padding-bottom: 4rem">
      <div class="section-head" style="text-align: left; margin-bottom: 2rem">
        <span class="section-label">My Account</span>
        <h1>Profile</h1>
        <div class="divider" style="margin-left: 0"></div>
      </div>
      <section
        style="
          display: grid;
          grid-template-columns: minmax(260px, 420px) 1fr;
          gap: 2rem;
          align-items: start;
        "
      >
        <div
          style="
            background: var(--white);
            border-radius: var(--radius);
            padding: 2rem;
            box-shadow: 0 4px 16px var(--shadow);
          "
        >
          <h2 style="font-size: 1.2rem; margin-bottom: 1rem">
            Account Details
          </h2>
          <div id="profile-box"><div class="spinner"></div></div>
        </div>
        <div
          style="
            background: var(--white);
            border-radius: var(--radius);
            padding: 2rem;
            box-shadow: 0 4px 16px var(--shadow);
          "
        >
          <h2 style="font-size: 1.2rem; margin-bottom: 1rem">My Orders</h2>
          <div id="orders-box"><div class="spinner"></div></div>
        </div>
      </section>
    </main>
    <script src="../js/utils.js"></script>
    <script>
      if (!isLoggedIn()) window.location.href = "/pages/login.html";
      const loadProfilePage = async () => {
        try {
          const profile = await api("/auth/profile", "GET", null, true);
          document.getElementById("profile-box").innerHTML =
            ` <p><strong>Name:</strong> ${profile.name || ""}</p> <p><strong>Email:</strong> ${profile.email || ""}</p> <p><strong>Role:</strong> ${profile.role || ""}</p> <p><strong>Phone:</strong> ${profile.phone || "-"}</p> <div style="display:flex;gap:0.75rem;flex-wrap:wrap;margin-top:1.5rem;"> <a class="btn btn-outline" href="/pages/products.html">Explore Crafts</a> ${profile.role === "artisan" ? '<a class="btn btn-primary" href="/pages/dashboard.html">Artisan Dashboard</a>' : ""} </div> `;
        } catch (err) {
          document.getElementById("profile-box").innerHTML =
            `<p style="color:var(--maroon);">${err.message}</p>`;
        }
        try {
          const user = getUser();
          if (user?.role !== "customer") {
            document.getElementById("orders-box").innerHTML =
              '<p style="opacity:0.7;">Orders appear here for customer accounts.</p>';
            return;
          }
          const orders = await api("/orders/my-orders", "GET", null, true);
          if (!orders.length) {
            document.getElementById("orders-box").innerHTML =
              '<div class="empty-state"><div class="icon"></div><h3>No orders yet</h3><p>Your orders will appear here.</p></div>';
            return;
          }
          document.getElementById("orders-box").innerHTML = orders
            .map(
              (order) =>
                ` <div style="border-bottom:1px solid var(--light);padding:1rem 0;"> <div style="display:flex;justify-content:space-between;gap:1rem;flex-wrap:wrap;"> <strong>#${order._id.slice(-8)}</strong> <span class="status-badge status-${order.orderStatus}">${order.orderStatus}</span> </div> <p style="font-size:0.82rem;opacity:0.7;margin-top:0.5rem;">${formatDate(order.createdAt)} · ${order.items.length} item(s) · ${formatPrice(order.totalAmount)}</p> </div> `,
            )
            .join("");
        } catch (err) {
          document.getElementById("orders-box").innerHTML =
            `<p style="color:var(--maroon);">${err.message}</p>`;
        }
      };
      loadProfilePage();
    </script>
  </body>
</html>
